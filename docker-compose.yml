# AI-Portal（all-in-one 版，内嵌 PostgreSQL）
#
# 一键启动:
#   docker-compose up -d
#
# 停止:   docker-compose down
# 清空数据: rm -rf ./data

services:
  app:
    image: 1panel/ai-portal:v0.0.1
    container_name: aiportal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-admintest}
      PANEL_BASE_URL: ${PANEL_BASE_URL:-}
      PANEL_API_KEY: ${PANEL_API_KEY:-}
    volumes:
      - ./data:/app/data:z
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
