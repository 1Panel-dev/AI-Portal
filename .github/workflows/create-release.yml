name: create-release

# 仅对正式版本 tag 生成 GitHub Release：
#   - v1.0.4  → 正式 Release
# 含后缀的 tag（v1.0.4-rc / v1.0.4-dev / v1.0.4-beta.1）不生成 Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag 名称（如 v1.0.4）'
        required: true
        default: 'v1.0.4'

permissions:
  contents: write

jobs:
  create-release:
    # 仅正式版本 tag（不含 -）生成 Release；workflow_dispatch 手动触发跳过此检查
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: 确定目标 tag
        id: target
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.target.outputs.tag }}
          fetch-depth: 0

      - name: 生成 Release 说明
        id: notes
        run: |
          TAG="${{ steps.target.outputs.tag }}"

          # 从 tag annotation 读取 release notes（git tag -a "v1.0.4" -F notes.md）
          TAG_MSG=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || true)

          # 过滤掉签名行（-----BEGIN PGP SIGNATURE----- 等）
          TAG_MSG=$(echo "$TAG_MSG" | sed '/^-----BEGIN PGP/,/^-----END PGP/d' || true)

          if [ -n "$TAG_MSG" ] && [ "$TAG_MSG" != "Release ${TAG}" ]; then
            # tag annotation 有实质性内容，直接用它
            echo "${TAG_MSG}" > release_notes.md
          else
            # fallback：从 git log 自动生成
            PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -1)

            {
              echo "## Changelog"
              echo ""
              if [ -n "$PREV_TAG" ]; then
                echo "### 提交记录 (\`${PREV_TAG}...${TAG}\`)"
                echo ""
                git log --pretty=format:'- %s (%h)' "${PREV_TAG}..${TAG}" --no-merges --invert-grep --grep='^chore:' --grep='^Merge' | head -50
                echo ""
              else
                echo "首次发布"
              fi
              echo ""
              echo "---"
              echo ""
              echo "## 镜像"
              echo ""
              echo "\`\`\`"
              echo "docker pull 1panel/ai-portal:${TAG}"
              echo "\`\`\`"
            } > release_notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.target.outputs.tag }}
          name: ${{ steps.target.outputs.tag }}
          body_path: release_notes.md
          prerelease: false
          draft: false
