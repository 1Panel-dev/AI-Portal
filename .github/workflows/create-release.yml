name: create-release

# 仅对正式版本 tag 生成 GitHub Release：
#   - v1.0.4  → 正式 Release
# 含后缀的 tag（v1.0.4-rc / v1.0.4-dev / v1.0.4-beta.1）不生成 Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    # 仅正式版本 tag（不含 -）生成 Release，rc/dev/beta 后缀一律跳过
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: 确定目标 tag
        id: target
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.target.outputs.tag }}
          fetch-depth: 0

      - name: 生成 Release 说明
        id: notes
        run: |
          TAG="${{ steps.target.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -1)

          {
            echo "## Changelog"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### 提交记录 (\`${PREV_TAG}...${TAG}\`)"
              echo ""
              git log --pretty=format:'- %s (%h)' "${PREV_TAG}..${TAG}" --no-merges --invert-grep --grep='^chore:' --grep='^Merge' | head -50
              echo ""
            else
              echo "首次发布"
              echo ""
              git log --pretty=format:'- %s (%h)' "${TAG}" --no-merges | head -50
              echo ""
            fi
            echo ""
            echo "---"
            echo ""
            echo "## 镜像"
            echo ""
            echo "\`\`\`"
            echo "docker pull 1panel/ai-portal:${TAG}"
            echo "\`\`\`"
          } > release_notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.target.outputs.tag }}
          name: ${{ steps.target.outputs.tag }}
          body_path: release_notes.md
          prerelease: false
          draft: false
